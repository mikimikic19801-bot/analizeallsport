        function App() {
            const [sport, setSport] = useState('tennis');
            const [teamA, setTeamA] = useState('');
            const [teamB, setTeamB] = useState('');
            const [oddsA, setOddsA] = useState('');
            const [oddsX, setOddsX] = useState('');
            const [oddsB, setOddsB] = useState('');
            const [matchDate, setMatchDate] = useState('');
            const [matchTime, setMatchTime] = useState('');
            const [league, setLeague] = useState('');
            const [additionalInfo, setAdditionalInfo] = useState('');
            
            // API ključ i modal management
            const [apiKey, setApiKey] = useState('');
            const [showKey, setShowKey] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);

            // Države učitavanja i rezultata
            const [loading, setLoading] = useState(false);
            const [loadingStep, setLoadingStep] = useState('');
            const [analysisResult, setAnalysisResult] = useState('');
            const [parsedConfidence, setParsedConfidence] = useState(75);
            const [sources, setSources] = useState([]);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);

            // PWA Install prompt state
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);

            // Istorija analiza
            const [history, setHistory] = useState([]);

            const currentSportConfig = SPORT_CONFIG[sport];

            useEffect(() => {
                const savedKey = localStorage.getItem('gemini_api_key');
                if (savedKey) {
                    setApiKey(savedKey);
                }
                
                const savedHistory = localStorage.getItem('analysis_history_v2');
                if (savedHistory) {
                    try {
                        setHistory(JSON.parse(savedHistory));
                    } catch(e) {
                        console.error("Greška pri učitavanju istorije", e);
                    }
                }

                // Pre-popuni sa podrazumevanim današnjim datumom
                const today = new Date();
                const day = String(today.getDate()).padStart(2, '0');
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const year = today.getFullYear();
                setMatchDate(`${day}.${month}.${year}.`);
                setMatchTime("20:00");

                // PWA Instalacija Event Listener
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setDeferredPrompt(e);
                    setIsInstallable(true);
                });

                window.addEventListener('appinstalled', () => {
                    setIsInstallable(false);
                    setDeferredPrompt(null);
                });
            }, []);

            // Automatska sinhronizacija API ključa sa localStorage
            const handleApiKeyChange = (val) => {
                setApiKey(val);
                if (val.trim()) {
                    localStorage.setItem('gemini_api_key', val.trim());
                } else {
                    localStorage.removeItem('gemini_api_key');
                }
            };

            const loadDemoData = (selectedSport = sport) => {
                const config = SPORT_CONFIG[selectedSport];
                setTeamA(config.defaultTeamA);
                setTeamB(config.defaultTeamB);
                setLeague(config.defaultLeague);
                setOddsA(config.oddsA);
                setOddsX(config.oddsX);
                setOddsB(config.oddsB);
                
                const today = new Date();
                const day = String(today.getDate()).padStart(2, '0');
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const year = today.getFullYear();
                setMatchDate(`${day}.${month}.${year}.`);
                setMatchTime("20:00");
            };

            const clearForm = () => {
                setTeamA('');
                setTeamB('');
                setOddsA('');
                setOddsX('');
                setOddsB('');
                setLeague('');
                setAdditionalInfo('');
            };

            const clearHistory = (e) => {
                e.stopPropagation();
                localStorage.removeItem('analysis_history_v2');
                setHistory([]);
            };

            const copyToClipboard = () => {
                if (!analysisResult) return;
                
                const textarea = document.createElement('textarea');
                textarea.value = analysisResult;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Neuspešno kopiranje', err);
                }
                document.body.removeChild(textarea);
            };

            const installApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    setIsInstallable(false);
                }
                setDeferredPrompt(null);
            };

            const generateAnalysis = async () => {
                if (!teamA || !teamB) {
                    setError('Molimo unesite nazive oba tima/igrača.');
                    return;
                }
                if (!oddsA || (!oddsB && sport !== 'tennis' && sport !== 'combat')) {
                    setError('Molimo unesite ispravne kvote za analizu.');
                    return;
                }

                setLoading(true);
                setError('');
                setAnalysisResult('');
                setSources([]);

                try {
                    setLoadingStep('Pristupam Google pretraživaču radi pronalaženja najnovijih vesti i forme...');
                    await new Promise(r => setTimeout(r, 600));

                    setLoadingStep(`Pretražujem internet za: "${teamA} vs ${teamB} najnovije vesti, sastavi, povrede, statistika"...`);
                    await new Promise(r => setTimeout(r, 800));

                    setLoadingStep('Analiziram međusobne susrete (H2H), motivaciju i taktičke postavke oba tima...');
                    await new Promise(r => setTimeout(r, 700));

                    const finalApiKey = apiKey.trim() || "";
                    const sportLabelSr = currentSportConfig.name;

                    const prompt = `
Analiziraj sledeći sportski događaj:
Sport: ${sportLabelSr}
Domaćin/Igrač A: ${teamA}
Gost/Igrač B: ${teamB}
Kvote u kladionicama: Pobeda A (${oddsA}) ${oddsX ? `, Nerešeno (${oddsX})` : ''}, Pobeda B (${oddsB})
Datum meča: ${matchDate || 'Danas'}
Vreme meča: ${matchTime || '20:00'}
Liga/Turnir: ${league || 'Kup/Prvenstvo'}
Dodatni kontekst: ${additionalInfo || 'Nema dodatnih napomena.'}

Pretraži internet i nađi najnovije informacije o formi, sastavima, povredama, motivaciji i statistici rivala za ovaj meč.

Zatim generiši analizu i predlog na srpskom jeziku, ali OBAVEZNO i STROGO prati sledeći format izlaza, bez ikakvih uvodnih ili završnih rečenica van šablona. Vaš izlaz mora izgledati ovako i imati potpuno iste prazne redove (ne preskači zaglavlje meča):

${teamA} - ${teamB}
${matchDate || 'Datum'} - ${matchTime || 'Vreme'}
${league || 'Liga'} – ${sportLabelSr}

[Detaljan paragraf o prvom timu/igraču A. Navedi tačne procente uspešnosti iz sezone (npr. 58.3%), specifičan stil igre, statističke podatke (asovi, šutevi, prosek golova zavisno od sporta), kretanje, prednosti i formu u poslednje vreme.]

[Detaljan paragraf o drugom timu/igraču B. Navedi tačne procente uspešnosti iz sezone, specifičan stil igre, kretanje, slabosti, probleme, povrede, procente osvajanja poena ili primljenih golova.]
H2H prednost ima [naziv tima/igrača koji vodi] sa [skor, npr. 2-1] u pobedama, [kratak opis gde i kada su igrali zadnji put i šta se desilo].

[Detaljan paragraf sa taktičkim objašnjenjem, kako će se meč odvijati, koji stil ima prednost i zašto je predloženi tip najrealniji ishod sa vrednošću.]

✅ Predlog: [Tip opklade, npr. Pobeda ${teamA} ili Više od 2.5 gola]
💰 Kvota: [Tačna kvota koja odgovara predlogu, npr. ${oddsA} ili slično]

[METADATA_CONFIDENCE_PERCENTAGE: Upisat samo broj od 10 do 100 ovde koji predstavlja sigurnost prognoze bez znaka %]
`;

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${finalApiKey}`;
                    
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        systemInstruction: {
                            parts: [{ text: "Ti si profesionalni sportski analitičar i vrhunski tipster. Tvoje analize su visoko analitičke, pune statistika i tačnih procenata. Uvek pišeš na čistom srpskom jeziku i striktno se držiš zahtevanog formata izlaza." }]
                        }
                    };

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || 'Greška u konekciji. Proverite da li je uneti API ključ ispravan.');
                    }

                    setLoadingStep('Oblikujem premium tipster izveštaj...');
                    const result = await response.json();
                    const candidate = result.candidates?.[0];
                    
                    if (candidate && candidate.content?.parts?.[0]?.text) {
                        let rawText = candidate.content.parts[0].text;
                        
                        // Izvlačenje i čišćenje procenta sigurnosti (confidence) iz metadata oznake na dnu
                        let confidence = 75;
                        const metadataIndex = rawText.indexOf('[METADATA_CONFIDENCE_PERCENTAGE:');
                        if (metadataIndex !== -1) {
                            const metaPart = rawText.substring(metadataIndex);
                            const match = metaPart.match(/\d+/);
                            if (match) {
                                confidence = parseInt(match[0]);
                            }
                            // Odseci metadata sa dna da se ne prikazuje u čistom tekstu analize
                            rawText = rawText.substring(0, metadataIndex).trim();
                        }

                        setAnalysisResult(rawText);
                        setParsedConfidence(confidence);

                        // Izvlačenje izvora (grounding)
                        let searchSources = [];
                        const groundingMetadata = candidate.groundingMetadata;
                        if (groundingMetadata && groundingMetadata.groundingAttributions) {
                            searchSources = groundingMetadata.groundingAttributions
                                .map(attr => ({
                                    uri: attr.web?.uri,
                                    title: attr.web?.title,
                                }))
                                .filter(s => s.uri && s.title);
                            searchSources = searchSources.filter((v, i, a) => a.findIndex(t => t.uri === v.uri) === i);
                        }
                        setSources(searchSources);

                        // Sačuvaj u istoriju
                        const historyItem = {
                            id: Date.now(),
                            timestamp: new Date().toLocaleString('sr-RS'),
                            sport,
                            teamA,
                            teamB,
                            matchDate,
                            matchTime,
                            league,
                            odds: `${oddsA}${oddsX ? ` - ${oddsX}` : ''} - ${oddsB}`,
                            analysisText: rawText,
                            confidence
                        };
                        const updatedHistory = [historyItem, ...history.slice(0, 9)];
                        setHistory(updatedHistory);
                        localStorage.setItem('analysis_history_v2', JSON.stringify(updatedHistory));
                    } else {
                        throw new Error('Nije dobijen uspešan odgovor. Pokušajte ponovo.');
                    }

                } catch (err) {
                    console.error(err);
                    setError(err.message || 'Povezivanje nije uspelo. Proverite vašu internet mrežu ili uneti API ključ.');
                } finally {
                    setLoading(false);
                    setLoadingStep('');
                }
